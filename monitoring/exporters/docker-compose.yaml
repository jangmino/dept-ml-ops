# 구 GPU 서버용 exporter 전용 스택
# 중앙 Prometheus(gpu-new)가 이 서버의 메트릭을 원격 scrape 한다.
#
# 사용법:
#   1. .env 파일에 SERVER_IP=<이 서버의 IP> 설정
#   2. sudo docker compose up -d
#
# 방화벽:
#   sudo ufw allow from 210.125.91.95 to any port 9100
#   sudo ufw allow from 210.125.91.95 to any port 8080
#   sudo ufw allow from 210.125.91.95 to any port 9400

services:
  node_exporter:
    image: prom/node-exporter:latest
    container_name: mon_node_exporter
    restart: unless-stopped
    pid: host
    command:
      - --path.rootfs=/host
    ports:
      - "${SERVER_IP}:9100:9100"
    volumes:
      - /:/host:ro,rslave

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:latest
    container_name: mon_cadvisor
    restart: unless-stopped
    privileged: true
    devices:
      - /dev/kmsg:/dev/kmsg
    ports:
      - "${SERVER_IP}:8080:8080"
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /sys:/sys:ro
      - /sys/fs/cgroup:/sys/fs/cgroup:ro
      - /var/lib/docker:/var/lib/docker:ro
    command:
      - "--housekeeping_interval=10s"
      - "--docker_only=false"
      # process 메트릭 그룹 활성화(기본 disable 목록에서 process만 제거) → container_processes/threads 노출.
      # 주의: --enable_metrics는 allowlist라 기존 메트릭을 다 꺼버리므로 사용 금지.
      - "--disable_metrics=advtcp,cpu_topology,cpuset,hugetlb,memory_numa,referenced_memory,resctrl,sched,tcp,udp"

  dcgm_exporter:
    image: nvidia/dcgm-exporter:latest
    container_name: mon_dcgm_exporter
    restart: unless-stopped
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: -1
              capabilities: ["gpu"]
    cap_add:
      - SYS_ADMIN
    ports:
      - "${SERVER_IP}:9400:9400"
