services:
  # в”Җв”Җ Reverse Proxy в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
  # мң мқјн•ң мҷёл¶Җ л…ём¶ң нҸ¬нҠё (80). GrafanaлҘј н”„лЎқмӢңн•ңлӢӨ.
  nginx:
    image: nginx:alpine
    container_name: mon_nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - /opt/monitoring/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - grafana
    networks:
      - monitoring

  # в”Җв”Җ Metrics Storage в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
  prometheus:
    image: prom/prometheus:latest
    container_name: mon_prometheus
    restart: unless-stopped
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=45d
      - --storage.tsdb.retention.size=50GB
    ports:
      - "127.0.0.1:9090:9090"   # localhostл§Ң вҖ” SSH н„°л„җлЎң м ‘к·ј
    volumes:
      # л””л үн„°лҰ¬ л§ҲмҡҙнҠё вҖ” лӢЁмқј нҢҢмқј л§ҲмҡҙнҠёлҠ” м—җл””н„° atomic save мӢң inodeк°Җ л°”лҖҢм–ҙ
      # м»Ён…Ңмқҙл„Ҳк°Җ мҳӣ нҢҢмқјмқ„ кі„мҶҚ ліҙлҠ” л¬ём ңк°Җ мһҲмқҢ. л””л үн„°лҰ¬лЎң л§ҲмҡҙнҠён•ҳл©ҙ мӣҗмІң м°ЁлӢЁлҗЁ.
      # (prometheus.yml + rules/ лҘј н•Ёк»ҳ нҸ¬н•Ён•ҳлҜҖлЎң rules лі„лҸ„ л§ҲмҡҙнҠё л¶Ҳн•„мҡ”)
      - /opt/monitoring/prometheus:/etc/prometheus:ro
      - prometheus_data:/prometheus
    networks:
      - monitoring

  # в”Җв”Җ Dashboard в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
  grafana:
    image: grafana/grafana:latest
    container_name: mon_grafana
    restart: unless-stopped
    ports:
      - "127.0.0.1:3000:3000"   # localhostл§Ң вҖ” nginxк°Җ н”„лЎқмӢң
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      # л№„л°ҖлІҲнҳёлҠ” Grafana UIм—җм„ң ліҖкІҪ мҷ„лЈҢ (grafana_data ліјлҘЁм—җ м ҖмһҘлҗЁ)
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_AUTH_ANONYMOUS_ENABLED=false
      - GF_SERVER_ROOT_URL=http://210.125.91.95
      - GF_SECURITY_COOKIE_SAMESITE=lax
      - GF_SECURITY_DISABLE_GRAVATAR=true
      - GF_SNAPSHOTS_EXTERNAL_ENABLED=false
    volumes:
      - grafana_data:/var/lib/grafana
      - /opt/monitoring/grafana/provisioning/datasources:/etc/grafana/provisioning/datasources:ro
    depends_on:
      - prometheus
    networks:
      - monitoring

  # в”Җв”Җ Exporters (лӮҙл¶Җ м „мҡ© вҖ” нҳёмҠӨнҠё нҸ¬нҠё м—ҶмқҢ) в”Җв”Җв”Җв”Җв”Җв”Җ
  node_exporter:
    image: prom/node-exporter:latest
    container_name: mon_node_exporter
    restart: unless-stopped
    pid: host
    command:
      - --path.rootfs=/host
    volumes:
      - /:/host:ro,rslave
    networks:
      - monitoring

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:latest
    container_name: mon_cadvisor
    restart: unless-stopped
    privileged: true
    devices:
      - /dev/kmsg:/dev/kmsg
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /sys:/sys:ro
      - /sys/fs/cgroup:/sys/fs/cgroup:ro
      - /var/lib/docker:/var/lib/docker:ro
    command:
      - "--housekeeping_interval=10s"
      - "--docker_only=false"
      # process л©”нҠёлҰӯ к·ёлЈ№ нҷңм„ұнҷ”(кё°ліё disable лӘ©лЎқм—җм„ң processл§Ң м ңкұ°) вҶ’ container_processes/threads л…ём¶ң.
      # мЈјмқҳ: --enable_metricsлҠ” allowlistлқј кё°мЎҙ л©”нҠёлҰӯмқ„ лӢӨ кәјлІ„лҰ¬лҜҖлЎң мӮ¬мҡ© кёҲм§Җ.
      - "--disable_metrics=advtcp,cpu_topology,cpuset,hugetlb,memory_numa,referenced_memory,resctrl,sched,tcp,udp"
    networks:
      - monitoring

  dcgm_exporter:
    image: nvidia/dcgm-exporter:latest
    container_name: mon_dcgm_exporter
    restart: unless-stopped
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: -1
              capabilities: ["gpu"]
    cap_add:
      - SYS_ADMIN
    # к¶Ңн•ң/м ‘к·ј мҳӨлҘҳ мӢң м•„лһҳлЎң лҢҖмІҙ к°ҖлҠҘ
    # privileged: true
    networks:
      - monitoring

  # в”Җв”Җ Alert Routing в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
  alertmanager:
    image: prom/alertmanager:latest
    container_name: mon_alertmanager
    restart: unless-stopped
    ports:
      - "127.0.0.1:9093:9093"   # localhostл§Ң вҖ” SSH н„°л„җлЎң м ‘к·ј
    volumes:
      - /opt/monitoring/alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - alertmanager_data:/alertmanager
    command:
      - --config.file=/etc/alertmanager/alertmanager.yml
      - --storage.path=/alertmanager
    networks:
      - monitoring

networks:
  monitoring:
    driver: bridge

volumes:
  prometheus_data:
  grafana_data:
  alertmanager_data:
