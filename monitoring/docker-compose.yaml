services:
  # ── Reverse Proxy ──────────────────────────────────
  # 유일한 외부 노출 포트 (80). Grafana를 프록시한다.
  nginx:
    image: nginx:alpine
    container_name: mon_nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - /opt/monitoring/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - grafana
    networks:
      - monitoring

  # ── Metrics Storage ────────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    container_name: mon_prometheus
    restart: unless-stopped
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=15d
    ports:
      - "127.0.0.1:9090:9090"   # localhost만 — SSH 터널로 접근
    volumes:
      - /opt/monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
      - /opt/monitoring/prometheus/rules:/etc/prometheus/rules:ro
    networks:
      - monitoring

  # ── Dashboard ──────────────────────────────────────
  grafana:
    image: grafana/grafana:latest
    container_name: mon_grafana
    restart: unless-stopped
    ports:
      - "127.0.0.1:3000:3000"   # localhost만 — nginx가 프록시
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      # 비밀번호는 Grafana UI에서 변경 완료 (grafana_data 볼륨에 저장됨)
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_AUTH_ANONYMOUS_ENABLED=false
      - GF_SERVER_ROOT_URL=http://210.125.91.95
      - GF_SECURITY_COOKIE_SAMESITE=lax
      - GF_SECURITY_DISABLE_GRAVATAR=true
      - GF_SNAPSHOTS_EXTERNAL_ENABLED=false
    volumes:
      - grafana_data:/var/lib/grafana
      - /opt/monitoring/grafana/provisioning/datasources:/etc/grafana/provisioning/datasources:ro
    depends_on:
      - prometheus
    networks:
      - monitoring

  # ── Exporters (내부 전용 — 호스트 포트 없음) ──────
  node_exporter:
    image: prom/node-exporter:latest
    container_name: mon_node_exporter
    restart: unless-stopped
    pid: host
    command:
      - --path.rootfs=/host
    volumes:
      - /:/host:ro,rslave
    networks:
      - monitoring

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:latest
    container_name: mon_cadvisor
    restart: unless-stopped
    privileged: true
    devices:
      - /dev/kmsg:/dev/kmsg
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /sys:/sys:ro
      - /sys/fs/cgroup:/sys/fs/cgroup:ro
      - /var/lib/docker:/var/lib/docker:ro
    command:
      - "--housekeeping_interval=10s"
      - "--docker_only=false"
    networks:
      - monitoring

  dcgm_exporter:
    image: nvidia/dcgm-exporter:latest
    container_name: mon_dcgm_exporter
    restart: unless-stopped
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: -1
              capabilities: ["gpu"]
    cap_add:
      - SYS_ADMIN
    # 권한/접근 오류 시 아래로 대체 가능
    # privileged: true
    networks:
      - monitoring

  # ── Alert Routing ──────────────────────────────────
  alertmanager:
    image: prom/alertmanager:latest
    container_name: mon_alertmanager
    restart: unless-stopped
    ports:
      - "127.0.0.1:9093:9093"   # localhost만 — SSH 터널로 접근
    volumes:
      - /opt/monitoring/alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - alertmanager_data:/alertmanager
    command:
      - --config.file=/etc/alertmanager/alertmanager.yml
      - --storage.path=/alertmanager
    networks:
      - monitoring

networks:
  monitoring:
    driver: bridge

volumes:
  prometheus_data:
  grafana_data:
  alertmanager_data:
