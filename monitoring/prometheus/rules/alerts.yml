groups:
  - name: node_alerts
    rules:
      # (1) 노드 자체가 죽었거나 exporter가 죽음
      - alert: NodeExporterDown
        expr: up{job="node"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "{{ $labels.server }} — Node exporter down"
          description: "node_exporter is down on {{ $labels.server }} ({{ $labels.instance }})."

      # (2) 디스크 여유 공간 부족 (10% 미만)
      - alert: DiskSpaceLow
        expr: |
          (node_filesystem_avail_bytes{fstype!~"tmpfs|overlay|squashfs|aufs"} /
           node_filesystem_size_bytes{fstype!~"tmpfs|overlay|squashfs|aufs"}) < 0.10
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "{{ $labels.server }} — Disk space low (<10% free)"
          description: "{{ $labels.server }}의 {{ $labels.mountpoint }}이 10% 미만 ({{ $labels.instance }})."

      # (3) 메모리 사용률 높음 (95% 이상)
      - alert: MemoryUsageHigh
        expr: |
          1 - (node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes) > 0.95
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "{{ $labels.server }} — Memory usage high (>95%)"
          description: "{{ $labels.server }}의 메모리 사용률 95% 초과 ({{ $labels.instance }})."

  - name: container_alerts
    rules:
      # (4) cAdvisor 다운
      - alert: CadvisorDown
        expr: up{job="cadvisor"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "{{ $labels.server }} — cAdvisor down"
          description: "{{ $labels.server }}의 cAdvisor가 1분 이상 다운 ({{ $labels.instance }})."

      # (5) 컨테이너 재시작 급증(5분 동안 3회 이상)
      - alert: ContainerRestartStorm
        expr: increase(container_start_time_seconds[5m]) > 3
        for: 1m
        labels:
          severity: warning
        annotations:
          summary: "{{ $labels.server }} — Container restart storm"
          description: "{{ $labels.server }}에서 컨테이너가 5분간 3회 이상 재시작."

      # (6) 컨테이너 프로세스 수 급증 — respawn 누수(cloudflared/watchdog 등) 조기 경보
      #     cAdvisor에 process 메트릭 그룹이 켜져 있어야 함(cadvisor command의 --disable_metrics에서 process 제외).
      - alert: ContainerProcessLeak
        expr: container_processes{name=~"team[0-9].*"} > 500
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "{{ $labels.server }} — Container process leak ({{ $labels.name }})"
          description: "{{ $labels.server }}의 {{ $labels.name }} 프로세스 수 {{ $value }}개 (>500). cloudflared/watchdog 등 무한 respawn 의심. pids_limit(8192) 도달 시 컨테이너 마비."

  - name: gpu_alerts
    rules:
      # (7) DCGM exporter 다운
      - alert: DcgmExporterDown
        expr: up{job="dcgm"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "{{ $labels.server }} — DCGM exporter down"
          description: "{{ $labels.server }}의 dcgm-exporter가 1분 이상 다운 ({{ $labels.instance }})."

      # (8) GPU 온도 높음 (기본 85C)
      # dcgm-exporter 버전에 따라 메트릭명이 다를 수 있어.
      # 보통 아래 메트릭 중 하나가 존재한다:
      # - DCGM_FI_DEV_GPU_TEMP
      # - dcgm_gpu_temp
      - alert: GpuTemperatureHigh
        expr: max(DCGM_FI_DEV_GPU_TEMP) > 85
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "{{ $labels.server }} — GPU temperature high (>85C)"
          description: "{{ $labels.server }}의 GPU 온도가 85°C 초과. 냉각/부하 확인 필요."

      # (9) GPU 메모리 사용률 높음 (95% 이상)
      # 대시보드에서 확인되는 메트릭에 따라 조정 가능
      - alert: GpuMemoryHigh
        expr: |
          (DCGM_FI_DEV_FB_USED / DCGM_FI_DEV_FB_TOTAL) > 0.95
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "{{ $labels.server }} — GPU memory usage high (>95%)"
          description: "{{ $labels.server }}의 GPU 메모리 사용률 95% 초과."
